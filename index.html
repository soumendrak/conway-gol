<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conway's Game of Life</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%231a1a2e'/%3E%3Crect x='4' y='12' width='4' height='4' fill='%23ff8c00'/%3E%3Crect x='8' y='8' width='4' height='4' fill='%23ff8c00'/%3E%3Crect x='8' y='12' width='4' height='4' fill='%23ff8c00'/%3E%3Crect x='12' y='16' width='4' height='4' fill='%23ff8c00'/%3E%3C/svg%3E">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1a;
    --surface: #16162a;
    --surface2: #1f1f3a;
    --border: #2a2a4a;
    --text: #c8c8e0;
    --text-dim: #7878a0;
    --accent: #ff8c00;
    --accent-glow: rgba(255,140,0,0.35);
    --accent-dim: rgba(255,140,0,0.12);
    --green: #33cc66;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 820px;
    width: 100%;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  header h1 span { color: var(--accent); }

  .stats-bar {
    display: flex;
    gap: 20px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .stats-bar strong {
    color: var(--text);
    font-weight: 600;
  }

  .canvas-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    box-shadow: var(--shadow);
    position: relative;
  }

  .canvas-wrapper canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 3 / 2;
    border-radius: 6px;
    cursor: crosshair;
    background: #0a0a14;
    touch-action: none;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
    align-items: center;
  }

  .controls .group {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .controls .group-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-dim);
    margin-right: 2px;
  }

  button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  button:hover {
    background: var(--border);
    border-color: var(--accent);
  }
  button:active {
    transform: scale(0.96);
  }
  button.primary {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: var(--accent);
  }
  button.primary:hover {
    background: rgba(255,140,0,0.25);
  }
  button.primary.active {
    background: var(--accent);
    color: #0d0d1a;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  button.danger {
    border-color: #cc3344;
    color: #ff5566;
  }
  button.danger:hover {
    background: rgba(204,51,68,0.2);
  }

  select, input[type="range"] {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  select { min-width: 100px; }
  select:focus, input:focus { outline: none; border-color: var(--accent); }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    padding: 0;
    border-radius: 2px;
    background: var(--border);
    width: 100px;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--surface);
    box-shadow: 0 0 6px var(--accent-glow);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--surface);
  }

  .pattern-dropdown {
    min-width: 150px;
  }

  .separator {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 4px;
  }

  .footer {
    margin-top: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-dim);
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }
  .footer a:hover { text-decoration: underline; }

  .mobile-controls { display: flex; gap: 6px; }

  @media (max-width: 640px) {
    body { padding: 12px; }
    header { flex-direction: column; align-items: flex-start; }
    .stats-bar { flex-wrap: wrap; gap: 10px; }
    .controls { gap: 6px; }
    .controls .group { flex-wrap: wrap; }
    button { padding: 6px 10px; font-size: 12px; }
    input[type="range"] { width: 80px; }
    .pattern-dropdown { min-width: 120px; }
    .separator { display: none; }
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Life <span>·</span> Conway's Game</h1>
    <div class="stats-bar">
      <span>Generation <strong id="genDisplay">0</strong></span>
      <span>Alive <strong id="aliveDisplay">0</strong></span>
      <span>Grid <strong id="gridSizeDisplay">60 × 40</strong></span>
    </div>
  </header>

  <div class="canvas-wrapper">
    <canvas id="golCanvas" width="900" height="600"></canvas>
  </div>

  <div class="controls">
    <div class="group">
      <button class="primary" id="playBtn">▶ Play</button>
      <button id="stepBtn">Step</button>
    </div>

    <div class="separator"></div>

    <div class="group">
      <span class="group-label">Speed</span>
      <input type="range" id="speedSlider" min="1" max="10" value="5">
    </div>

    <div class="separator"></div>

    <div class="group">
      <span class="group-label">Grid</span>
      <select id="gridSizeSelect">
        <option value="small">Small</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Large</option>
      </select>
    </div>

    <div class="separator"></div>

    <div class="group">
      <button id="randomBtn">🎲 Random</button>
      <button id="clearBtn" class="danger">✕ Clear</button>
    </div>

    <div class="separator"></div>

    <div class="group">
      <span class="group-label">Pattern</span>
      <select id="patternSelect" class="pattern-dropdown">
        <option value="">— select —</option>
        <option value="glider">Glider</option>
        <option value="pulsar">Pulsar</option>
        <option value="beacon">Beacon</option>
        <option value="blinker">Blinker</option>
        <option value="gosper">Gosper Glider Gun</option>
      </select>
    </div>
  </div>

  <div class="footer">
    <span>Conway's Game of Life — cellular automaton</span>
    <span>click cells · <a href="#" id="rulesToggle">rules</a></span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ─── DOM refs ──────────────────────────────────────────────────────
  const canvas  = document.getElementById('golCanvas');
  const ctx     = canvas.getContext('2d');
  const playBtn = document.getElementById('playBtn');
  const stepBtn = document.getElementById('stepBtn');
  const speedSlider = document.getElementById('speedSlider');
  const gridSizeSelect = document.getElementById('gridSizeSelect');
  const randomBtn = document.getElementById('randomBtn');
  const clearBtn = document.getElementById('clearBtn');
  const patternSelect = document.getElementById('patternSelect');
  const genDisplay = document.getElementById('genDisplay');
  const aliveDisplay = document.getElementById('aliveDisplay');
  const gridSizeDisplay = document.getElementById('gridSizeDisplay');
  const toastEl = document.getElementById('toast');
  const rulesToggle = document.getElementById('rulesToggle');

  // ─── Grid sizes ────────────────────────────────────────────────────
  const GRID_SIZES = {
    small:  { cols: 30, rows: 20 },
    medium: { cols: 60, rows: 40 },
    large:  { cols: 90, rows: 60 }
  };

  const CANVAS_W = 900, CANVAS_H = 600;

  let cols = 60, rows = 40;
  let grid = [];
  let next = [];
  let generation = 0;
  let running = false;
  let timerId = null;
  let animId = null;
  let cellSize = CANVAS_W / cols;

  // Mouse state for click-drag toggling
  let mouseDown = false;
  let painting = null; // true = set alive, false = set dead
  let lastPainted = new Set();

  // ─── Toast ──────────────────────────────────────────────────────────
  let toastTimeout;

  function toast(msg) {
    clearTimeout(toastTimeout);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  // ─── Grid ops ──────────────────────────────────────────────────────
  function initGrid() {
    grid = Array.from({ length: rows }, () => new Uint8Array(cols));
    next = Array.from({ length: rows }, () => new Uint8Array(cols));
    generation = 0;
  }

  function clearGrid() {
    for (let r = 0; r < rows; r++) grid[r].fill(0);
    generation = 0;
    updateStats();
    draw();
  }

  function randomize(density) {
    density = density || 0.25;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        grid[r][c] = Math.random() < density ? 1 : 0;
      }
    }
    generation = 0;
    updateStats();
    draw();
    toast(`Random fill (${Math.round(density * 100)}% density)`);
  }

  function countAlive() {
    let n = 0;
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        n += grid[r][c];
    return n;
  }

  function updateStats() {
    genDisplay.textContent = generation;
    aliveDisplay.textContent = countAlive();
  }

  // ─── Game logic ────────────────────────────────────────────────────
  function step() {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        let neighbors = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
              neighbors += grid[nr][nc];
            }
          }
        }
        const alive = grid[r][c];
        next[r][c] = (alive && (neighbors === 2 || neighbors === 3)) || (!alive && neighbors === 3) ? 1 : 0;
      }
    }
    [grid, next] = [next, grid];
    generation++;
    updateStats();
    draw();
  }

  // ─── Drawing ───────────────────────────────────────────────────────
  function draw() {
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    animId = requestAnimationFrame(() => {
      cellSize = CANVAS_W / cols;
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

      // Background
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Grid lines (subtle)
      ctx.strokeStyle = 'rgba(255,255,255,0.035)';
      ctx.lineWidth = 0.5;
      for (let c = 1; c < cols; c++) {
        const x = c * cellSize;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, CANVAS_H);
        ctx.stroke();
      }
      for (let r = 1; r < rows; r++) {
        const y = r * cellSize;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(CANVAS_W, y);
        ctx.stroke();
      }

      // Live cells with orange glow
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (!grid[r][c]) continue;
          const x = c * cellSize;
          const y = r * cellSize;
          const pad = Math.max(1, cellSize * 0.08);
          const w = cellSize - pad * 2;

          // Glow effect
          const glowR = cellSize * 0.5;
          const grad = ctx.createRadialGradient(
            x + cellSize/2, y + cellSize/2, 0,
            x + cellSize/2, y + cellSize/2, glowR
          );
          grad.addColorStop(0, 'rgba(255,140,0,0.35)');
          grad.addColorStop(1, 'rgba(255,140,0,0)');
          ctx.fillStyle = grad;
          ctx.fillRect(x - glowR/2, y - glowR/2, cellSize + glowR, cellSize + glowR);

          // Cell body
          ctx.fillStyle = '#ff8c00';
          ctx.shadowColor = 'rgba(255,140,0,0.5)';
          ctx.shadowBlur = Math.max(3, cellSize * 0.2);
          ctx.fillRect(x + pad, y + pad, w, w);
          ctx.shadowBlur = 0;
        }
      }

      animId = null;
    });
  }

  // ─── Resize grid ───────────────────────────────────────────────────
  function setGridSize(sizeKey) {
    const spec = GRID_SIZES[sizeKey];
    if (!spec) return;
    cols = spec.cols;
    rows = spec.rows;
    cellSize = CANVAS_W / cols;
    gridSizeDisplay.textContent = `${cols} × ${rows}`;
    initGrid();
    updateStats();
    draw();
    toast(`Grid: ${cols} × ${rows}`);
  }

  // ─── Patterns (offsets relative to grid center) ────────────────────
  const PATTERNS = {
    glider: {
      name: 'Glider',
      cells: [[1,0],[2,1],[0,2],[1,2],[2,2]]
    },
    pulsar: {
      name: 'Pulsar',
      cells: (function() {
        // Pulsar period-3 oscillator (13x13)
        const coords = [];
        const offsets = [2,3,4,8,9,10];
        for (let r = 0; r < 5; r++) {
          for (const c of offsets) {
            coords.push([c, r]);
            coords.push([c, 12 - r]);
          }
        }
        for (let c = 0; c < 5; c++) {
          for (const r of offsets) {
            coords.push([c, r]);
            coords.push([12 - c, r]);
          }
        }
        // Deduplicate — use Set with string keys
        const seen = new Set();
        return coords.filter(([r,c]) => {
          const k = r+','+c;
          if (seen.has(k)) return false;
          seen.add(k);
          return true;
        });
      })()
    },
    beacon: {
      name: 'Beacon',
      cells: [[0,0],[1,0],[0,1],[2,3],[3,2],[3,3]]
    },
    blinker: {
      name: 'Blinker',
      cells: [[1,0],[1,1],[1,2]]
    },
    gosper: {
      name: 'Gosper Glider Gun',
      cells: (function() {
        // Canonical Gosper Glider Gun — decoded from RLE
        // x = 36, y = 9
        // 24bo$22bobo$12b2o6b2o12b2o$11bo3bo4b2o12b2o$2o8bo5bo3b2o$
        // 2o8bo3bob2o4bobo$10bo5bo7bo$11bo3bo$12b2o!
        const raw = [
          [0,24],
          [1,22],[1,24],
          [2,12],[2,13],[2,20],[2,21],[2,34],[2,35],
          [3,11],[3,15],[3,20],[3,21],[3,34],[3,35],
          [4,0],[4,1],[4,10],[4,16],[4,20],[4,21],
          [5,0],[5,1],[5,10],[5,14],[5,16],[5,17],[5,23],[5,25],
          [6,10],[6,16],[6,24],
          [7,11],[7,15],
          [8,12],[8,13]
        ];
        return raw;
      })()
    },
  };

  function applyPattern(name) {
    const pattern = PATTERNS[name];
    if (!pattern) return false;

    clearGrid();

    const cCells = pattern.cells;
    if (!cCells || cCells.length === 0) {
      toast('Pattern data error');
      return false;
    }

    // Find bounding box and center it
    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    for (const [r, c] of cCells) {
      if (r < minR) minR = r;
      if (r > maxR) maxR = r;
      if (c < minC) minC = c;
      if (c > maxC) maxC = c;
    }
    const pHeight = maxR - minR + 1;
    const pWidth  = maxC - minC + 1;
    const centerR = Math.floor((rows - pHeight) / 2);
    const centerC = Math.floor((cols - pWidth) / 2);

    for (const [r, c] of cCells) {
      const gr = r - minR + centerR;
      const gc = c - minC + centerC;
      if (gr >= 0 && gr < rows && gc >= 0 && gc < cols) {
        grid[gr][gc] = 1;
      }
    }

    generation = 0;
    updateStats();
    draw();
    toast(`Placed: ${pattern.name}`);
    return true;
  }

  // ─── Canvas interaction ────────────────────────────────────────────
  function getCellFromEvent(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / rect.width;
    const scaleY = canvas.height / rect.height;
    let clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
      e.preventDefault();
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    const x = (clientX - rect.left) * scaleX;
    const y = (clientY - rect.top)  * scaleY;
    const c = Math.floor(x / cellSize);
    const r = Math.floor(y / cellSize);
    return { r, c, valid: r >= 0 && r < rows && c >= 0 && c < cols };
  }

  function toggleCell(r, c) {
    if (r < 0 || r >= rows || c < 0 || c >= cols) return;
    grid[r][c] = grid[r][c] ? 0 : 1;
    generation = (grid[r][c] && generation === 0) ? 0 : generation;
    // If paused and we toggle, reset generation counter to 0
    // Actually, let's keep generation counter as-is but don't reset it on toggle
    updateStats();
    draw();
  }

  function handlePointerDown(e) {
    if (running) return;
    const cell = getCellFromEvent(e);
    if (!cell.valid) return;

    const wasAlive = grid[cell.r][cell.c];
    toggleCell(cell.r, cell.c);
    mouseDown = true;
    painting = !wasAlive; // toggle: if was dead, we paint alive; if alive, we paint dead
    lastPainted = new Set();
    lastPainted.add(cell.r + ',' + cell.c);
  }

  function handlePointerMove(e) {
    if (!mouseDown || running) return;
    const cell = getCellFromEvent(e);
    if (!cell.valid) return;
    const key = cell.r + ',' + cell.c;
    if (lastPainted.has(key)) return;
    // If the cell already matches what we're painting, skip
    if ((painting && grid[cell.r][cell.c]) || (!painting && !grid[cell.r][cell.c])) return;
    grid[cell.r][cell.c] = painting ? 1 : 0;
    lastPainted.add(key);
    updateStats();
    draw();
  }

  function handlePointerUp() {
    mouseDown = false;
    painting = null;
    lastPainted.clear();
  }

  // ─── Play / Pause ──────────────────────────────────────────────────
  function play() {
    if (running) {
      pause();
      return;
    }
    running = true;
    playBtn.textContent = '⏸ Pause';
    playBtn.classList.add('active');
    runLoop();
  }

  function pause() {
    running = false;
    playBtn.textContent = '▶ Play';
    playBtn.classList.remove('active');
    if (timerId) {
      clearTimeout(timerId);
      timerId = null;
    }
    encodeGridToURL();
  }

  // ─── URL-encoded grid state sharing ────────────────────────────
  function encodeGridToURL() {
    // Flatten grid rows into a single Uint8Array, compress via base64
    const flat = new Uint8Array(rows * cols);
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        flat[r * cols + c] = grid[r][c];
      }
    }
    // Convert to binary string then base64
    let binary = '';
    for (let i = 0; i < flat.length; i++) {
      binary += String.fromCharCode(flat[i]);
    }
    const encoded = btoa(binary);
    // Store cols/rows metadata (compact: 'cols,rows:base64')
    const hash = cols + ',' + rows + ':' + encoded;
    history.replaceState(null, '', '#' + hash);
    toast('Pattern URL updated in address bar');
  }

  function decodeGridFromURL(hash) {
    try {
      // Format: "cols,rows:base64data"
      const colonIdx = hash.indexOf(':');
      if (colonIdx === -1) return false;
      const dims = hash.substring(0, colonIdx).split(',');
      const savedCols = parseInt(dims[0], 10);
      const savedRows = parseInt(dims[1], 10);
      if (isNaN(savedCols) || isNaN(savedRows)) return false;
      const encoded = hash.substring(colonIdx + 1);
      const binary = atob(encoded);
      const expected = savedCols * savedRows;
      if (binary.length !== expected) return false;

      // If grid dimensions differ from saved, resize first
      if (cols !== savedCols || rows !== savedRows) {
        // Find matching grid size preset or custom
        let sizeKey = null;
        for (const [key, spec] of Object.entries(GRID_SIZES)) {
          if (spec.cols === savedCols && spec.rows === savedRows) {
            sizeKey = key;
            break;
          }
        }
        if (!sizeKey) {
          toast('Grid size mismatch — cannot restore pattern');
          return false;
        }
        setGridSize(sizeKey);
      }

      // Restore grid from binary
      initGrid();
      for (let i = 0; i < binary.length; i++) {
        const r = Math.floor(i / savedCols);
        const c = i % savedCols;
        grid[r][c] = binary.charCodeAt(i);
      }
      generation = 0;
      updateStats();
      draw();
      toast('Restored pattern from URL');
      return true;
    } catch (e) {
      return false;
    }
  }

  function runLoop() {
    if (!running) return;
    step();
    const delay = Math.max(20, 220 - speedSlider.value * 20);
    timerId = setTimeout(runLoop, delay);
  }

  // ─── Speed change ──────────────────────────────────────────────────
  function onSpeedChange() {
    if (running) {
      if (timerId) clearTimeout(timerId);
      runLoop();
    }
  }

  // ─── Events ────────────────────────────────────────────────────────
  // Mouse
  canvas.addEventListener('mousedown', handlePointerDown);
  canvas.addEventListener('mousemove', handlePointerMove);
  window.addEventListener('mouseup', handlePointerUp);
  // Touch
  canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
  canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
  window.addEventListener('touchend', handlePointerUp);
  window.addEventListener('touchcancel', handlePointerUp);

  // Prevent context menu on canvas
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Buttons
  playBtn.addEventListener('click', play);
  stepBtn.addEventListener('click', () => { if (!running) step(); });
  clearBtn.addEventListener('click', () => { if (running) pause(); clearGrid(); toast('Grid cleared'); });
  randomBtn.addEventListener('click', () => { if (running) pause(); randomize(0.25); });

  // Speed
  speedSlider.addEventListener('input', onSpeedChange);

  // Grid size
  gridSizeSelect.addEventListener('change', () => {
    if (running) pause();
    setGridSize(gridSizeSelect.value);
  });

  // Patterns
  patternSelect.addEventListener('change', () => {
    const val = patternSelect.value;
    if (!val) return;
    if (running) pause();
    applyPattern(val);
    patternSelect.value = '';
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      play();
    }
    if (e.key === 's' || e.key === 'S') {
      if (!running) step();
    }
    if (e.key === 'c' || e.key === 'C') {
      if (running) pause();
      clearGrid();
      toast('Grid cleared');
    }
    if (e.key === 'r' || e.key === 'R') {
      if (running) pause();
      randomize(0.25);
    }
  });

  // Rules modal (simple inline)
  rulesToggle.addEventListener('click', (e) => {
    e.preventDefault();
    showRules();
  });

  function showRules() {
    // Quick rules overlay using toast-like mechanism
    const overlay = document.createElement('div');
    overlay.style.cssText = `
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(4px);
    `;
    const box = document.createElement('div');
    box.style.cssText = `
      background: #16162a; border: 1px solid #2a2a4a;
      border-radius: 12px; padding: 30px 36px; max-width: 440px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    `;
    box.innerHTML = `
      <h2 style="margin-bottom:16px; font-size:18px; color:#ff8c00;">Rules of Life</h2>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px 20px; font-size:14px; line-height:1.5;">
        <div style="color:#7878a0;">Any live cell with<br><strong style="color:#c8c8e0;">2 or 3</strong> neighbours</div>
        <div style="color:#33cc66;">↳ survives</div>
        <div style="color:#7878a0;">Any live cell with<br><strong style="color:#c8c8e0;"><2</strong> neighbours</div>
        <div style="color:#ff5566;">↳ dies (underpopulation)</div>
        <div style="color:#7878a0;">Any live cell with<br><strong style="color:#c8c8e0;">>3</strong> neighbours</div>
        <div style="color:#ff5566;">↳ dies (overpopulation)</div>
        <div style="color:#7878a0;">Any dead cell with<br><strong style="color:#c8c8e0;">exactly 3</strong> neighbours</div>
        <div style="color:#33cc66;">↳ becomes alive (reproduction)</div>
      </div>
      <p style="margin-top:20px; font-size:12px; color:#7878a0;">Space = play/pause · S = step · C = clear · R = random</p>
      <button style="margin-top:16px; background:#ff8c00; color:#0d0d1a; border:none; border-radius:6px; padding:8px 24px; font-size:14px; font-weight:600; cursor:pointer;">Got it</button>
    `;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    const close = () => { document.body.removeChild(overlay); };
    box.querySelector('button').addEventListener('click', close);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
  }

  // ─── Check for URL hash on load ────────────────────────────────────
  // Initialization
  setGridSize('medium');
  if (window.location.hash && window.location.hash.length > 1) {
    const decoded = decodeGridFromURL(window.location.hash.substring(1));
    if (!decoded) {
      randomize(0.15);
    }
  } else {
    randomize(0.15);
  }
})();
</script>
</body>
</html>
